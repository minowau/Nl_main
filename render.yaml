services:
  - type: web
    name: nlp-learning-grid
    runtime: docker
    plan: free
    region: oregon # Or your preferred region
    envVars:
      - key: PORT
        value: 5000
      - key: GROQ_API_KEY
        sync: false # Set manually in Render dashboard
      - key: OPENAI_API_KEY
        sync: false # Set manually in Render dashboard
