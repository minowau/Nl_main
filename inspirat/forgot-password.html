<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Gooru Learning - Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="toast" class="toast"></div>

  <div class="forgot-page">
    <!-- Need help link -->
    <a href="#" class="need-help-link">Need help?</a>

    <!-- Centered card -->
    <div class="forgot-card">
      <!-- Lock icon -->
      <div class="lock-icon">
        <img src="Assets/Auth/Form/icons/ic_password.svg" alt="Password icon" width="96" height="96">
      </div>

      <!-- Text -->
      <div class="forgot-text">
        <h2>Forgot your password?</h2>
        <p>Please enter the email address associated with your account, and we'll email you a link to reset your password.</p>
      </div>

      <!-- Form -->
      <div class="forgot-form">
        <div class="input-group" id="emailGroup">
          <input type="email" id="forgotEmailInput" placeholder="Email ID" oninput="validateForgotForm(); clearError();">
          <label class="floating-label" for="forgotEmailInput">Email ID</label>
          <div class="error-text">
            <svg viewBox="0 0 24 24" fill="#ff5630">
              <path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/>
            </svg>
            <span id="emailErrorMsg">This email is not registered with us.</span>
          </div>
        </div>

        <button class="login-btn" id="resetBtn" disabled onclick="handleResetPassword()">Send Reset Link</button>

        <a href="index.html" class="return-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
          </svg>
          Return to sign in
        </a>
      </div>
    </div>
  </div>

  <script>
    function validateForgotForm() {
      const email = document.getElementById('forgotEmailInput').value;
      const resetBtn = document.getElementById('resetBtn');
      const emailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      resetBtn.disabled = !emailValid;
    }

    function handleResetPassword() {
      const email = document.getElementById('forgotEmailInput').value;
      if (!email) {
        showError('Please enter your email.');
        return;
      }

      // Simulate API check - replace with actual backend call
      // For demo: emails ending with @gooru.com are "registered"
      if (email.endsWith('@gooru.com')) {
        clearError();
        showToast('Reset link sent to ' + email, 'success');
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 2500);
      } else {
        showError('This email is not registered with us.');
      }
    }

    function showError(message) {
      const group = document.getElementById('emailGroup');
      const errorMsg = document.getElementById('emailErrorMsg');
      group.classList.add('error');
      errorMsg.textContent = message;
    }

    function clearError() {
      const group = document.getElementById('emailGroup');
      group.classList.remove('error');
    }

    function showToast(message, type) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + type + ' show';
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }
  </script>
</body>
</html>
